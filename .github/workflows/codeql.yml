name: CodeQL
# Static security analysis (GitHub first-party action only; no run: steps,
# no untrusted event data anywhere in this workflow).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '26 5 * * 1'   # weekly, Monday 05:26 UTC

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-and-quality
      - uses: github/codeql-action/analyze@v3
