name: CI
# No untrusted event data is interpolated anywhere in this workflow.
on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx tsc -p tsconfig.json --noEmit
      - run: npx vitest run
      - run: npm run build
