name: Release
# Publishes to npm via Trusted Publishing (OIDC) when a v* tag is pushed —
# no stored token. The npm package settings link this repo + workflow as
# the trusted publisher; provenance is attested automatically.
# No untrusted event data is interpolated anywhere in this workflow.
on:
  push:
    tags: ['v*']

permissions:
  contents: write   # create GitHub Releases
  id-token: write   # required for OIDC trusted publishing + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm install -g npm@latest   # trusted publishing needs npm >= 11.5
      - run: npm ci
      - run: npx vitest run
      - run: npm run build
      - run: npm publish --access public
      # github.ref_name is the pushed tag (git-ref-constrained, not free text);
      # passed via env and quoted — the hook-recommended safe pattern.
      - name: Create GitHub Release
        run: gh release create "$TAG" --title "$TAG" --generate-notes
        env:
          GITHUB_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
